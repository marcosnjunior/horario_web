<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Horário das Turmas - Pedras de Fogo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/horario-completo.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container-fluid py-4">
        <!-- Header com data em destaque -->
        <div class="row mb-4">
            <div class="col-12 text-center">
                <h1 class="display-5">
                    <i class="bi bi-calendar-week"></i> Horário das Turmas
                </h1>
                <p class="lead">Pedras de Fogo - 2026.1</p>
                <!-- Data alinhada à direita com largura automática (apenas dígitos) -->
                <div class="data-destaque mt-3 d-flex justify-content-end">
                    <input type="date" id="dataReferencia" class="form-control w-auto">
                    <span hidden class="badge bg-secondary ms-2" id="dataAtualBadge"></span>
                </div>
            </div>
        </div>

        <!-- Filtros -->
        <div class="row mb-4 g-3 align-items-center justify-content-end">
            <div hidden class="col-md-4">
                <label class="form-label fw-bold">
                    <i class="bi bi-building"></i> Filtrar Turma:
                </label>
                <select id="filtroCurso" class="form-select">
                    <option value="todos">Todas as Turmas</option>
                </select>
            </div>
            <div hidden class="col-md-3">
                <label class="form-label fw-bold">
                    <i class="bi bi-sun"></i> Filtrar Período:
                </label>
                <select id="filtroPeriodo" class="form-select">
                    <option value="todos">Todos os Períodos</option>
                    <option value="manha">Manhã (07:00 - 11:20)</option>
                    <option value="tarde">Tarde (13:00 - 17:10)</option>
                    <option value="noite">Noite (18:30 - 21:10)</option>
                </select>
            </div>
            <div hidden class="col-md-3">
                <label class="form-label fw-bold">
                    <i class="bi bi-funnel"></i> Status da Aula:
                </label>
                <select id="filtroStatus" class="form-select">
                    <option value="todos">Todos os Status</option>
                    <option value="normal">⭐ Aula Normal</option>
                    <option value="substituicao">🔄 Com Substituição</option>
                    <option value="ausencia">⚠️ Professor Ausente</option>
                </select>
            </div>
        </div>

        <!-- Legenda -->
        <div hidden class="row mb-3">
            <div class="col-12">
                <div class="legenda-container">
                    <span class="legenda-item legenda-substituicao">
                        <i class="bi bi-square-fill"></i> Substituição
                    </span>
                    <span class="legenda-item legenda-ausencia">
                        <i class="bi bi-square-fill"></i> Ausente
                    </span>
                    <span class="legenda-item legenda-conflito">
                        <i class="bi bi-square-fill"></i> Conflito
                    </span>
                </div>
            </div>
        </div>

        <!-- Grade Horária -->
        <div class="row">
            <div class="col-12">
                <div class="card shadow-lg">
                    <div class="card-header bg-secondary text-white d-flex justify-content-between align-items-center flex-wrap">
                        <h4 class="mb-0">
                            <i class="bi bi-table"></i>
                        </h4>
                        <div>
                            <button id="btnAtualizar" class="btn btn-light btn-sm">
                                <i class="bi bi-arrow-repeat"></i>
                            </button>
                            <a href="/pages/construtor_horario.html" id="btnFaltar" class="btn btn-dark btn-sm ms-2">
                                <i class="bi bi-gear"></i>
                            </a>
                            <button id="btnExportarPDF" class="btn btn-danger btn-sm ms-2">
                                <i class="bi bi-file-pdf"></i>
                            </button>
                            <a href="/pages/horario-professor.html" id="btnFaltar" class="btn btn-success btn-sm ms-2">
                                <i class="bi bi-clock"></i>
                            </a>
                            <a href="/pages/registra_faltas.html" id="btnFaltar" class="btn btn-warning btn-sm ms-2">
                                <i class="bi bi-person-slash"></i> Faltar
                            </a>
                        </div>
                    </div>
                    <div class="card-body p-0">
                        <div id="gradeContainer" class="table-responsive">
                            <div class="text-center p-5">
                                <div class="spinner-border text-primary" role="status">
                                    <span class="visually-hidden">Carregando...</span>
                                </div>
                                <p class="mt-3">Carregando horários das turmas...</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Modal de Detalhes da Aula -->
        <div class="modal fade" id="detalhesAulaModal" tabindex="-1">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header" id="modalHeader">
                        <h5 class="modal-title">
                            <i class="bi bi-info-circle"></i> Detalhes da Aula
                        </h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body" id="modalBody">
                        <!-- Conteúdo dinâmico -->
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Toast de Notificação -->
        <div class="toast-container position-fixed bottom-0 end-0 p-3">
            <div id="notificationToast" class="toast" role="alert">
                <div class="toast-header">
                    <i class="bi bi-bell-fill me-2"></i>
                    <strong class="me-auto">Notificação</strong>
                    <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
                </div>
                <div class="toast-body"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="/js/horario-completo.js"></script>
</body>
</html>
