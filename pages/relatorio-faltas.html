<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório de Faltas - Pedras de Fogo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            margin-bottom: 30px;
        }

        .card-header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 20px 25px;
        }

        .card-header h2 {
            margin: 0;
            font-size: 1.5rem;
        }

        .card-body {
            padding: 25px;
        }

        .btn-back {
            background: #6c757d;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .btn-back:hover {
            background: #5a6268;
            color: white;
        }

        .btn-pdf {
            background: #dc3545;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
        }

        .btn-pdf:hover {
            background: #c82333;
            transform: translateY(-2px);
        }

        .btn-filter {
            background: #28a745;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
        }

        .btn-filter:hover {
            background: #218838;
        }

        .filters {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            align-items: flex-end;
        }

        .filter-group {
            flex: 1;
            min-width: 150px;
        }

        .filter-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 0.85rem;
            color: #555;
        }

        .filter-group input, .filter-group select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-card h3 {
            font-size: 2rem;
            margin: 0;
        }

        .stat-card p {
            margin: 5px 0 0;
            opacity: 0.9;
        }

        .table-container {
            overflow-x: auto;
            max-height: 500px;
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        th {
            background: #f8f9fa;
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        tr:hover {
            background: #f5f5f5;
        }

        .detail-row {
            background: #f8f9fa;
        }

        .detail-row td {
            padding: 15px 20px;
        }

        .substituicoes-list {
            margin: 0;
            padding-left: 20px;
        }

        .substituicoes-list li {
            margin: 5px 0;
        }

        .badge-success {
            background: #28a745;
            color: white;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 0.75rem;
        }

        .badge-warning {
            background: #ffc107;
            color: #333;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 0.75rem;
        }

        .badge-danger {
            background: #dc3545;
            color: white;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 0.75rem;
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: #999;
        }

        .expand-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            color: #0d6efd;
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 15px;
        }

        @media print {
            body {
                background: white;
                padding: 0;
            }
            .no-print {
                display: none;
            }
            .card {
                box-shadow: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Botões de navegação -->
        <div class="no-print">
            <a href="../index.html" class="btn-back">
                <i class="bi bi-arrow-left"></i> Voltar para Grade Horária
            </a>
            <a href="faltas.html" class="btn-back" style="background: #17a2b8;">
                <i class="bi bi-clipboard-plus"></i> Registrar Nova Falta
            </a>
        </div>

        <!-- Card principal -->
        <div class="card">
            <div class="card-header">
                <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;">
                    <div>
                        <h2><i class="bi bi-bar-chart-stats"></i> Relatório de Histórico de Faltas</h2>
                        <p class="mb-0 mt-1" style="opacity: 0.9;">Análise completa de faltas e substituições</p>
                    </div>
                    <button id="btnGerarPDF" class="btn-pdf no-print">
                        <i class="bi bi-file-pdf"></i> Gerar PDF do Relatório
                    </button>
                </div>
            </div>
            <div class="card-body">
                <!-- Filtros -->
                <div class="filters no-print">
                    <div class="filter-group">
                        <label><i class="bi bi-calendar"></i> Data Início</label>
                        <input type="date" id="filtroDataInicio">
                    </div>
                    <div class="filter-group">
                        <label><i class="bi bi-calendar"></i> Data Fim</label>
                        <input type="date" id="filtroDataFim">
                    </div>
                    <div class="filter-group">
                        <label><i class="bi bi-person"></i> Professor</label>
                        <select id="filtroProfessor">
                            <option value="">Todos</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>&nbsp;</label>
                        <button id="btnAplicarFiltros" class="btn-filter">
                            <i class="bi bi-funnel"></i> Aplicar Filtros
                        </button>
                    </div>
                </div>

                <!-- Cards de Estatísticas -->
                <div class="stats-grid" id="statsContainer">
                    <div class="stat-card">
                        <h3 id="totalFaltas">0</h3>
                        <p>Total de Faltas</p>
                    </div>
                    <div class="stat-card" style="background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);">
                        <h3 id="totalAulas">0</h3>
                        <p>Total de Aulas</p>
                    </div>
                    <div class="stat-card" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">
                        <h3 id="totalSubstituicoes">0</h3>
                        <p>Aulas Substituídas</p>
                    </div>
                    <div class="stat-card" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);">
                        <h3 id="totalProfessores">0</h3>
                        <p>Professores Envolvidos</p>
                    </div>
                </div>

                <!-- Tabela de Registros -->
                <div class="table-container" id="tabelaContainer">
                    <div class="empty-state">
                        <i class="bi bi-inbox"></i>
                        <p>Nenhum registro de falta encontrado</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Chave para armazenamento no localStorage
        const STORAGE_KEY = 'historicoFaltas';
        
        // Variáveis globais
        let faltas = [];
        
        // Inicialização
        document.addEventListener('DOMContentLoaded', () => {
            carregarDados();
            configurarFiltros();
            renderizarRelatorio();
        });
        
        // Carregar dados do localStorage
        function carregarDados() {
            const dadosSalvos = localStorage.getItem(STORAGE_KEY);
            if (dadosSalvos) {
                faltas = JSON.parse(dadosSalvos);
            }
            
            // Preencher select de professores
            const professoresSet = new Set();
            faltas.forEach(falta => {
                professoresSet.add(falta.professor);
                falta.substituicoes?.forEach(sub => {
                    if (sub.professorSubstituto) {
                        professoresSet.add(sub.professorSubstituto);
                    }
                });
            });
            
            const selectProfessor = document.getElementById('filtroProfessor');
            selectProfessor.innerHTML = '<option value="">Todos</option>';
            Array.from(professoresSet).sort().forEach(prof => {
                const option = document.createElement('option');
                option.value = prof;
                option.textContent = prof;
                selectProfessor.appendChild(option);
            });
            
            // Definir datas padrão para os filtros (últimos 30 dias)
            const hoje = new Date();
            const trintaDiasAtras = new Date();
            trintaDiasAtras.setDate(hoje.getDate() - 30);
            
            document.getElementById('filtroDataFim').value = hoje.toISOString().split('T')[0];
            document.getElementById('filtroDataInicio').value = trintaDiasAtras.toISOString().split('T')[0];
        }
        
        // Configurar event listeners dos filtros
        function configurarFiltros() {
            document.getElementById('btnAplicarFiltros').addEventListener('click', () => {
                renderizarRelatorio();
            });
        }
        
        // Aplicar filtros
        function aplicarFiltros() {
            const dataInicio = document.getElementById('filtroDataInicio').value;
            const dataFim = document.getElementById('filtroDataFim').value;
            const professorFiltro = document.getElementById('filtroProfessor').value;
            
            let faltasFiltradas = [...faltas];
            
            if (dataInicio) {
                faltasFiltradas = faltasFiltradas.filter(f => f.data >= dataInicio);
            }
            if (dataFim) {
                faltasFiltradas = faltasFiltradas.filter(f => f.data <= dataFim);
            }
            if (professorFiltro) {
                faltasFiltradas = faltasFiltradas.filter(f => 
                    f.professor === professorFiltro || 
                    f.substituicoes?.some(s => s.professorSubstituto === professorFiltro)
                );
            }
            
            return faltasFiltradas;
        }
        
        // Renderizar relatório completo
        function renderizarRelatorio() {
            const faltasFiltradas = aplicarFiltros();
            
            // Calcular estatísticas
            const totalFaltas = faltasFiltradas.length;
            let totalAulas = 0;
            let totalSubstituidas = 0;
            const professoresSet = new Set();
            
            faltasFiltradas.forEach(falta => {
                professoresSet.add(falta.professor);
                const aulas = falta.substituicoes || [];
                totalAulas += aulas.length;
                totalSubstituidas += aulas.filter(a => a.professorSubstituto).length;
                aulas.forEach(a => {
                    if (a.professorSubstituto) professoresSet.add(a.professorSubstituto);
                });
            });
            
            document.getElementById('totalFaltas').textContent = totalFaltas;
            document.getElementById('totalAulas').textContent = totalAulas;
            document.getElementById('totalSubstituicoes').textContent = totalSubstituidas;
            document.getElementById('totalProfessores').textContent = professoresSet.size;
            
            // Renderizar tabela
            const container = document.getElementById('tabelaContainer');
            
            if (faltasFiltradas.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="bi bi-inbox"></i>
                        <p>Nenhum registro encontrado com os filtros aplicados</p>
                    </div>
                `;
                return;
            }
            
            // Ordenar por data (mais recente primeiro)
            faltasFiltradas.sort((a, b) => new Date(b.data) - new Date(a.data));
            
            let html = `
                <table id="relatorioTable">
                    <thead>
                        <tr>
                            <th>Data</th>
                            <th>Dia</th>
                            <th>Professor Faltante</th>
                            <th>Motivo</th>
                            <th>Total Aulas</th>
                            <th>Substituídas</th>
                            <th>Detalhes</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            faltasFiltradas.forEach((falta, index) => {
                const aulas = falta.substituicoes || [];
                const totalAulasAula = aulas.length;
                const substituidas = aulas.filter(a => a.professorSubstituto).length;
                const semSubstituto = totalAulasAula - substituidas;
                
                html += `
                    <tr id="row-${index}">
                        <td>${formatarData(falta.data)}</td>
                        <td>${falta.diaSemana || 'Não informado'}</td>
                        <td><strong>${escapeHtml(falta.professor)}</strong></td>
                        <td>${escapeHtml(falta.motivo.substring(0, 50))}${falta.motivo.length > 50 ? '...' : ''}</td>
                        <td>${totalAulasAula}</td>
                        <td>
                            ${substituidas} / ${totalAulasAula}
                            ${semSubstituto > 0 ? `<span class="badge-warning" style="margin-left: 5px;">${semSubstituto} sem sub</span>` : '<span class="badge-success">✓ Completo</span>'}
                        </td>
                        <td>
                            <button class="expand-btn" onclick="toggleDetalhes(${index})">
                                <i class="bi bi-eye" id="icon-${index}"></i>
                            </button>
                        </td>
                    </tr>
                    <tr id="detalhes-${index}" style="display: none;" class="detail-row">
                        <td colspan="7">
                            <div style="padding: 10px;">
                                <strong><i class="bi bi-calendar"></i> Informações da Falta:</strong><br>
                                <small>Registrada em: ${formatarDataHora(falta.dataRegistro)}</small><br>
                                <strong>Motivo completo:</strong> ${escapeHtml(falta.motivo)}<br><br>
                                
                                <strong><i class="bi bi-table"></i> Detalhamento das Aulas:</strong>
                                <ul class="substituicoes-list">
                    `;
                
                aulas.forEach((aula, aulaIndex) => {
                    const turnoNome = aula.periodo === 'manha' ? '🌅 Manhã' : (aula.periodo === 'tarde' ? '🌙 Tarde' : '⭐ Noite');
                    html += `
                        <li>
                            <strong>${turnoNome} (${aula.horario})</strong><br>
                            📚 Disciplina: ${escapeHtml(aula.disciplina)}<br>
                            🏫 Curso: ${escapeHtml(aula.curso)}<br>
                            👨‍🏫 Professor substituto: ${aula.professorSubstituto ? escapeHtml(aula.professorSubstituto) : '<span class="badge-danger" style="padding: 2px 6px;">⚠️ NÃO SUBSTITUÍDO</span>'}<br>
                            ${aula.professorSubstituto ? `<div class="mt-1"><span class="badge-success">✓ Substituição confirmada</span></div>` : '<div class="mt-1"><span class="badge-warning">⚠️ Aguardando substituto</span></div>'}
                            ${aulaIndex < aulas.length - 1 ? '<hr style="margin: 10px 0;">' : ''}
                        </li>
                    `;
                });
                
                html += `
                                </ul>
                                ${semSubstituto > 0 ? `
                                    <div class="alert alert-warning mt-3" style="padding: 10px; background: #fff3cd; border-radius: 8px;">
                                        <i class="bi bi-exclamation-triangle"></i>
                                        <strong>Atenção:</strong> ${semSubstituto} aula(s) não foram substituídas. Recomenda-se buscar substitutos com urgência.
                                    </div>
                                ` : `
                                    <div class="alert alert-success mt-3" style="padding: 10px; background: #d4edda; border-radius: 8px;">
                                        <i class="bi bi-check-circle"></i>
                                        <strong>Parabéns!</strong> Todas as aulas foram substituídas com sucesso.
                                    </div>
                                `}
                            </div>
                        </td>
                    </tr>
                `;
            });
            
            html += `
                    </tbody>
                </table>
            `;
            
            container.innerHTML = html;
        }
        
        // Alternar exibição de detalhes
        function toggleDetalhes(index) {
            const detalhesRow = document.getElementById(`detalhes-${index}`);
            const icon = document.getElementById(`icon-${index}`);
            
            if (detalhesRow.style.display === 'none') {
                detalhesRow.style.display = 'table-row';
                icon.className = 'bi bi-eye-slash';
            } else {
                detalhesRow.style.display = 'none';
                icon.className = 'bi bi-eye';
            }
        }
        
        // Formatar data
        function formatarData(dataString) {
            if (!dataString) return 'Não informada';
            const [ano, mes, dia] = dataString.split('-');
            return `${dia}/${mes}/${ano}`;
        }
        
        // Formatar data e hora
        function formatarDataHora(dataString) {
            if (!dataString) return 'Não informada';
            const data = new Date(dataString);
            return data.toLocaleString('pt-BR');
        }
        
        // Gerar PDF
        function gerarPDF() {
            const element = document.querySelector('.card');
            const opt = {
                margin: [10, 10, 10, 10],
                filename: `relatorio_faltas_${new Date().toISOString().slice(0, 19).replace(/:/g, '-')}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true, logging: false },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' }
            };
            
            // Expandir todos os detalhes para o PDF
            const allDetailRows = document.querySelectorAll('[id^="detalhes-"]');
            const allIcons = document.querySelectorAll('[id^="icon-"]');
            const wasVisible = [];
            
            allDetailRows.forEach((row, idx) => {
                wasVisible[idx] = row.style.display === 'table-row';
                row.style.display = 'table-row';
            });
            
            html2pdf().set(opt).from(element).save().then(() => {
                // Restaurar estado original
                allDetailRows.forEach((row, idx) => {
                    if (!wasVisible[idx]) {
                        row.style.display = 'none';
                    }
                });
            });
        }
        
        // Função auxiliar escape HTML
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Tornar função toggleDetalhes global
        window.toggleDetalhes = toggleDetalhes;
        
        // Configurar botão de PDF
        document.getElementById('btnGerarPDF').addEventListener('click', gerarPDF);
    </script>
</body>
</html>
