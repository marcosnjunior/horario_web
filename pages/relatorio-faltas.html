<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Relatório de Faltas - Pedras de Fogo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/relatorio-faltas.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container-fluid py-4">
        <!-- Header -->
        <div class="row mb-4">
            <div class="col-12 text-center">
                <h1 class="display-5">
                    <i class="bi bi-calendar-check"></i> Relatório de Faltas
                </h1>
                <p class="lead">Pedras de Fogo - 2026.1</p>
                <hr>
            </div>
        </div>

        <!-- Card de seleção de mês -->
        <div class="row justify-content-center mb-4">
            <div class="col-md-6">
                <div class="card shadow-sm border-0">
                    <div class="card-body text-center">
                        <div class="mb-3">
                            <label for="mesSelecionado" class="form-label fw-bold">
                                <i class="bi bi-calendar-month"></i> Selecione o mês
                            </label>
                            <input type="month" id="mesSelecionado" class="form-control form-control-lg text-center">
                        </div>
                        <button id="btnCarregarRelatorio" class="btn btn-primary btn-lg px-4">
                            <i class="bi bi-search"></i> Gerar Relatório
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Card do relatório -->
        <div class="row" id="relatorioContainer" style="display: none;">
            <div class="col-12">
                <div class="card shadow-lg">
                    <div class="card-header bg-danger text-white d-flex justify-content-between align-items-center flex-wrap">
                        <h4 class="mb-0">
                            <i class="bi bi-exclamation-triangle"></i> Faltas Registradas
                        </h4>
                        <div>
                            <button id="btnExportarPDF" class="btn btn-light btn-sm">
                                <i class="bi bi-file-pdf"></i> Exportar PDF
                            </button>
                            <button id="btnExportarCSV" class="btn btn-success btn-sm ms-2">
                                <i class="bi bi-file-spreadsheet"></i> Exportar CSV
                            </button>
                        </div>
                    </div>
                    <div class="card-body p-0">
                        <div id="tabelaFaltasContainer" class="table-responsive">
                            <!-- Conteúdo dinâmico -->
                        </div>
                    </div>
                    <div class="card-footer bg-light" id="footerResumo">
                        <!-- Resumo será inserido aqui -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Loading Overlay -->
        <div id="loadingOverlay" class="loading-overlay" style="display: none;">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Carregando...</span>
            </div>
            <p class="mt-2 text-white">Carregando dados...</p>
        </div>

        <!-- Toast de Notificação -->
        <div class="toast-container position-fixed bottom-0 end-0 p-3">
            <div id="notificationToast" class="toast" role="alert">
                <div class="toast-header">
                    <i class="bi bi-bell-fill me-2"></i>
                    <strong class="me-auto">Notificação</strong>
                    <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
                </div>
                <div class="toast-body"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="../js/relatorio-faltas.js"></script>
</body>
</html>
