<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Horário do Professor - Pedras de Fogo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/horario-professor.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="container-fluid py-4">
    <!-- Cabeçalho -->
    <div class="row mb-4">
        <div class="col-12 text-center">
            <h1 class="display-5">
                <i class="bi bi-person-badge"></i> Horário Individual
            </h1>
            <p class="lead">Pedras de Fogo - 2026.1</p>
            <hr>
        </div>
    </div>

    <!-- Seletor de professor + botão PDF -->
    <div class="row mb-4 align-items-end justify-content-between">
        <div class="col-md-5">
            <label class="form-label fw-bold">
                <i class="bi bi-person-video"></i> Selecione o professor:
            </label>
            <select id="professorSelect" class="form-select">
                <option value="">-- Carregando professores --</option>
            </select>
        </div>
        <div class="col-md-2 text-end">
            <button id="btnExportarPDF" class="btn btn-danger btn-lg w-100" disabled>
                <i class="bi bi-file-pdf"></i> Exportar PDF
            </button>
        </div>
    </div>

    <!-- Legenda de cores das disciplinas -->
    <div class="row mb-3" id="legendaContainer" style="display: none;">
        <div class="col-12">
            <div class="legenda-wrapper">
                <strong class="me-3"><i class="bi bi-palette"></i> Disciplina(s):</strong>
                <div id="legendaCores" class="d-flex flex-wrap gap-2"></div>
            </div>
        </div>
    </div>

    <!-- Grade do professor -->
    <div class="row">
        <div class="col-12">
            <div class="card shadow-lg">
                <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                    <h4 class="mb-0" id="professorNomeHeader">
                        <i class="bi bi-person-square"></i> Professor não selecionado
                    </h4>
                    <a href="../index.html" class="btn btn-outline-light btn-sm">
                        <i class="bi bi-arrow-left"></i> Voltar para Turmas
                    </a>
                </div>
                <div class="card-body p-0">
                    <div id="gradeContainer" class="table-responsive">
                        <div class="text-center p-5">
                            <i class="bi bi-person-x" style="font-size: 3rem;"></i>
                            <p class="mt-3 text-muted">Selecione um professor para visualizar a grade.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Toast de notificações -->
<div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="notificationToast" class="toast" role="alert">
        <div class="toast-header">
            <i class="bi bi-bell-fill me-2"></i>
            <strong class="me-auto">Notificação</strong>
            <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
        </div>
        <div class="toast-body"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="../js/horario-professor.js"></script>
</body>
</html>
